<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写真撮影 | tk14 works</title>
  <meta name="description" content="プロフィール写真と家族写真を中心に、自然体で魅力が伝わる写真撮影を行っています。">
  <link rel="stylesheet" href="/assets/css/site.css?v=6">
</head>
<body class="profile-minimal site-photo">
  <header class="profile-header">
    <div class="profile-header__inner">
      <a class="profile-logo" href="/">tk14 works</a>
      <button class="profile-menu-button" type="button" aria-label="メニューを開く" aria-expanded="false" data-nav-toggle>Menu</button>
      <nav class="profile-nav" aria-label="写真ページメニュー" data-nav>
        <a href="/photo/profile/">プロフィール写真</a>
        <a href="/photo/family/">家族写真</a>
        <a href="#contact">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <nav class="tk-breadcrumb" aria-label="パンくずリスト">
    <ol>
      <li><a href="/">HOME</a></li>
      <li><span aria-current="page">写真</span></li>
    </ol>
  </nav>

  <main>
    <section class="tk-hero" id="home">
      <div class="tk-hero__image" data-reveal>
        <img src="/images/profile-about.jpg" alt="写真撮影のイメージ">
      </div>
      <div class="tk-hero__copy" data-reveal>
        <p class="tk-label">Photography</p>
        <h1>自然体のまま、<br>伝わる写真を。</h1>
        <p>
          プロフィール写真と家族写真。目的は違っても、
          大切にしたいのは、その人らしい空気が伝わることです。
        </p>
      </div>
    </section>

    <section class="tk-section" id="services">
      <div class="tk-container">
        <h2 class="tk-title" data-reveal>撮影メニュー</h2>
        <div class="tk-menu-grid">
          <a class="tk-menu-card tk-menu-card--link" href="/photo/profile/" data-reveal>
            <span>tk14</span>
            <h3>プロフィール写真</h3>
            <p>SNS、ホームページ、宣材写真など、人柄と信頼感が伝わる写真を撮影します。</p>
          </a>
          <a class="tk-menu-card tk-menu-card--link" href="/photo/family/" data-reveal>
            <span>Moment</span>
            <h3>家族写真</h3>
            <p>家族写真、七五三、日常の記録など、今しかない時間を自然に残します。</p>
          </a>
        </div>
      </div>
    </section>

    <section class="tk-section tk-section--soft" id="contact">
      <div class="tk-container">
        <div class="tk-contact" data-reveal>
          <h2>お問い合わせ</h2>
          <p>撮影内容や希望時期を添えてご相談ください。</p>
          <a class="tk-button" href="mailto:info@example.com">Contact</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="tk-footer">
    <a href="/">tk14 works</a>
  </footer>

  <script src="/assets/js/site.js?v=6"></script>
</body>
</html>
