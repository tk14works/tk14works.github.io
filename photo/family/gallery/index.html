<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moment Gallery | 家族写真ギャラリー</title>
  <meta name="description" content="Momentの家族写真、七五三、日常、撮影会、犬との写真をまとめたギャラリーページです。">
  <link rel="stylesheet" href="/assets/css/site.css?v=9">
</head>
<body class="profile-minimal site-family moment-gallery-page">
  <header class="profile-header">
    <div class="profile-header__inner">
      <a class="profile-logo" href="/photo/family/">Moment</a>
      <button class="profile-menu-button" type="button" aria-label="メニューを開く" aria-expanded="false" data-nav-toggle>Menu</button>
      <nav class="profile-nav" aria-label="Momentギャラリーメニュー" data-nav>
        <a href="/photo/family/">Moment</a>
        <a href="#gallery">ギャラリー</a>
        <a href="/photo/family/#contact">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <nav class="tk-breadcrumb" aria-label="パンくずリスト">
    <ol>
      <li><a href="/">HOME</a></li>
      <li><a href="/photo/">Photo</a></li>
      <li><a href="/photo/family/">Moment</a></li>
      <li><span aria-current="page">Gallery</span></li>
    </ol>
  </nav>

  <main>
    <section class="tk-section moment-gallery-hero" id="gallery">
      <div class="tk-container">
        <p class="tk-label" data-reveal>Moment Gallery</p>
        <h1 class="tk-title" data-reveal>家族の時間を、写真で見る。</h1>
        <p class="tk-section-lead" data-reveal>
          家族写真、七五三、日常の記録、撮影会。<br>
          その日の空気や表情を、ゆっくりご覧ください。
        </p>

        <div class="moment-gallery-filters" aria-label="ギャラリーカテゴリ" data-gallery-filters>
          <button class="is-active" type="button" data-gallery-filter="all">すべて</button>
          <button type="button" data-gallery-filter="family">家族写真</button>
          <button type="button" data-gallery-filter="shichigosan">七五三</button>
          <button type="button" data-gallery-filter="everyday">日常</button>
          <button type="button" data-gallery-filter="session">撮影会</button>
          <button type="button" data-gallery-filter="dog">犬</button>
        </div>

        <div class="moment-gallery-grid" data-gallery-grid>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="family">
            <img src="/images/placeholder-family-card.svg" alt="家族写真の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--landscape" data-gallery-category="family">
            <img src="/images/placeholder-moment-hero.svg" alt="家族写真の横長仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="shichigosan">
            <img src="/images/placeholder-family-card.svg" alt="七五三撮影の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--landscape" data-gallery-category="everyday">
            <img src="/images/placeholder-moment-hero.svg" alt="日常の記録の横長仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="dog session">
            <img src="/images/placeholder-family-card.svg" alt="犬との撮影会の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="family">
            <img src="/images/placeholder-family-card.svg" alt="親子写真の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--landscape" data-gallery-category="shichigosan family">
            <img src="/images/placeholder-moment-hero.svg" alt="七五三と家族写真の横長仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="everyday">
            <img src="/images/placeholder-family-card.svg" alt="日常の家族写真の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--landscape" data-gallery-category="session">
            <img src="/images/placeholder-moment-hero.svg" alt="撮影会の横長仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="dog">
            <img src="/images/placeholder-family-card.svg" alt="犬の家族写真の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="shichigosan">
            <img src="/images/placeholder-family-card.svg" alt="七五三の表情の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--landscape" data-gallery-category="family everyday">
            <img src="/images/placeholder-moment-hero.svg" alt="日常の家族時間の横長仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="session">
            <img src="/images/placeholder-family-card.svg" alt="撮影会の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--landscape" data-gallery-category="dog family">
            <img src="/images/placeholder-moment-hero.svg" alt="犬と家族の横長仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="everyday">
            <img src="/images/placeholder-family-card.svg" alt="何気ない日常の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="family">
            <img src="/images/placeholder-family-card.svg" alt="家族の記念日の仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--landscape" data-gallery-category="shichigosan">
            <img src="/images/placeholder-moment-hero.svg" alt="七五三の横長仮ギャラリー画像">
          </figure>
          <figure class="moment-gallery-item moment-gallery-item--portrait" data-gallery-category="dog session">
            <img src="/images/placeholder-family-card.svg" alt="犬との撮影会写真の仮ギャラリー画像">
          </figure>
        </div>
      </div>
    </section>

    <section class="tk-section tk-section--soft">
      <div class="tk-container">
        <div class="tk-contact" data-reveal>
          <h2>撮影のご相談</h2>
          <p>気になる写真の雰囲気があれば、撮影内容とあわせてお気軽にご相談ください。</p>
          <a class="tk-button" href="/photo/family/#contact">お問い合わせへ</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="tk-footer">
    <a href="/">tk14</a>
  </footer>

  <script src="/assets/js/site.js?v=9"></script>
</body>
</html>
