<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tk14 | AIと写真で、仕事と魅力を整える</title>
  <meta name="description" content="tk14は、AIによる業務効率化支援と写真撮影を通して、仕事と人の魅力が伝わる形づくりをサポートします。">
  <link rel="stylesheet" href="/assets/css/site.css?v=8">
</head>
<body class="profile-minimal site-top">
  <header class="profile-header">
    <div class="profile-header__inner">
      <a class="profile-logo" href="/">tk14</a>
      <button class="profile-menu-button" type="button" aria-label="メニューを開く" aria-expanded="false" data-nav-toggle>Menu</button>
      <nav class="profile-nav" aria-label="主要メニュー" data-nav>
        <a href="/ai/">AI</a>
        <a href="/photo/">写真</a>
      </nav>
    </div>
  </header>

  <nav class="tk-breadcrumb" aria-label="パンくずリスト">
    <ol>
      <li><span aria-current="page">HOME</span></li>
    </ol>
  </nav>

  <main>
    <section class="tk-hero tk-hero--text-only" id="home">
      <div class="tk-hero__copy" data-reveal>
        <p class="tk-label">AI support / Photography</p>
        <h1>あなたの仕事を整える。<br>あなたの魅力を伝える。</h1>
        <p>
          AIと写真を通して、<br class="tk-mobile-break">あなたらしい活動をサポートします。
        </p>
      </div>
    </section>

    <section class="tk-section" id="services">
      <div class="tk-container">
        <h2 class="tk-title" data-reveal>サービスを選ぶ</h2>
        <p class="tk-section-lead" data-reveal>ご希望の内容をご覧ください。</p>
        <div class="tk-menu-grid tk-menu-grid--two">
          <a class="tk-menu-card tk-menu-card--link" href="/ai/" data-reveal>
            <figure class="tk-menu-card__image">
              <img src="/images/top-card-ai.jpg" alt="AI活用サポートのイメージ">
            </figure>
            <span>AI</span>
            <h3>AI・DX活用サポート</h3>
            <p>AIを活用して、仕事や活動をサポートします。</p>
          </a>
          <a class="tk-menu-card tk-menu-card--link" href="/photo/" data-reveal>
            <figure class="tk-menu-card__image">
              <img src="/images/top-card-photo.jpg" alt="写真撮影のイメージ">
            </figure>
            <span>Photo</span>
            <h3>写真撮影</h3>
            <p>自然体で、あなたらしい写真を撮影します。</p>
          </a>
        </div>
      </div>
    </section>

  </main>

  <footer class="tk-footer">
    <a href="/">tk14</a>
  </footer>

  <script src="/assets/js/site.js?v=8"></script>
</body>
