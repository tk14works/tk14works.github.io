<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 編集ここ：サイトタイトル -->
    <title>tk14 Works | 写真とAIで、活動をつくる。</title>
    <!-- 編集ここ：メタディスクリプション -->
    <meta name="description" content="PhotographyとAIを通して、あなたらしい発信や活動をサポートします。">
    <style>
        /* =========================================
           CSS Variables & Reset
        ========================================= */
        :root {
            --color-bg: #F7F7F5;
            --color-text: #1A1A1A;
            --color-main: #1F2937;
            --color-accent: #BFA46F;
            --color-card-bg: #FFFFFF;
            
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
            --spacing-xl: 6rem;
            
            --transition-speed: 0.4s;
            --transition-easing: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button, a.button {
            cursor: pointer;
            font-family: inherit;
        }

        /* =========================================
           Typography
        ========================================= */
        h1, h2, h3 {
            font-weight: 400;
            line-height: 1.3;
        }

        .text-center { text-align: center; }
        .tracking-wide { letter-spacing: 0.05em; }
        
        /* =========================================
           Layout
        ========================================= */
        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: var(--spacing-xl) 0;
        }

        /* =========================================
           Hero Section
        ========================================= */
        .hero {
            margin-bottom: var(--spacing-xl);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero__brand {
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            margin-bottom: var(--spacing-lg);
            color: var(--color-main);
            text-transform: uppercase;
        }

        .hero__title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: var(--spacing-md);
            letter-spacing: 0.02em;
        }

        .hero__subtitle {
            font-size: clamp(1rem, 2vw, 1.125rem);
            color: #555;
            max-width: 600px;
            margin: 0 auto;
        }

        /* =========================================
           Portal Cards Section
        ========================================= */
        .portals {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-lg);
        }

        @media (min-width: 768px) {
            .portals {
                grid-template-columns: 1fr 1fr;
                gap: var(--spacing-md);
            }
        }

        .card {
            background-color: var(--color-card-bg);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed) var(--transition-easing), 
                        box-shadow var(--transition-speed) var(--transition-easing);
            text-decoration: none;
            color: var(--color-text);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            position: relative;
        }

        .card:hover, .card:focus-visible {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            outline: none;
        }

        .card:active {
            transform: translateY(-2px);
        }

        .card__color-wrapper {
            position: relative;
            width: 100%;
            /* 縦長を解消するため、高さを抑えて視認しやすい横長な比率(16:7)に変更 */
            aspect-ratio: 16 / 7; 
            overflow: hidden;
        }

        .card__color-block {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 背景色の変化もアニメーションに含める */
            transition: transform 0.8s var(--transition-easing), filter 0.4s ease, background-color 0.4s ease;
        }

        .color-block--ai {
            /* AI部門はメインカラー（ダークグレー）を設定 */
            background-color: var(--color-main);
        }

        .color-block--photo {
            /* Photo部門はアクセントカラー（ゴールド系）を設定 */
            background-color: var(--color-accent);
        }

        /* ホバー時に少しズーム */
        .card:hover .card__color-block, .card:focus-visible .card__color-block {
            transform: scale(1.08); 
        }

        /* ダークカラーのAI部門は、色を直接明るくして変化をはっきりさせる */
        .card:hover .color-block--ai, .card:focus-visible .color-block--ai {
            background-color: #3f4e63; /* メインカラーより数段明るいグレーブルー */
            filter: brightness(1.1);
        }

        /* Photo部門は少し明るくする演出 */
        .card:hover .color-block--photo, .card:focus-visible .color-block--photo {
            filter: brightness(1.15);
        }

        .card__content {
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            align-items: center;
            text-align: center;
        }

        .card__brand {
            font-size: 0.875rem;
            color: var(--color-accent);
            letter-spacing: 0.1em;
            margin-bottom: var(--spacing-xs);
            text-transform: uppercase;
        }

        .card__title {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-sm);
            color: var(--color-main);
        }

        .card__description {
            font-size: 0.9375rem;
            color: #555;
            margin-bottom: var(--spacing-md);
            flex-grow: 1;
        }

        .card__button {
            display: inline-block;
            padding: 0.75rem 2rem;
            background-color: transparent;
            color: var(--color-main);
            border: 1px solid var(--color-main);
            border-radius: 4px;
            font-size: 0.9375rem;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .card:hover .card__button, .card:focus-visible .card__button {
            background-color: var(--color-main);
            color: white;
        }

        /* =========================================
           Footer
        ========================================= */
        footer {
            padding: var(--spacing-md) 0;
            text-align: center;
            font-size: 0.875rem;
            color: #888;
        }

        /* =========================================
           Animation Classes
        ========================================= */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s var(--transition-easing), 
                        transform 0.8s var(--transition-easing);
        }

        .fade-in.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .fade-in {
                opacity: 1;
                transform: none;
                transition: none;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="container">
            <!-- Hero Section -->
            <section class="hero fade-in">
                <!-- 編集ここ：ブランド名 -->
                <!-- text-transform: uppercase によって大文字にならないよう、CSSを外すか小文字を強制する必要があります。ここではインラインで小文字化 -->
                <p class="hero__brand" style="text-transform: none;">tk14 Works</p>
                <!-- 編集ここ：メインコピー -->
                <h1 class="hero__title text-center tracking-wide">写真とAIで、<br>活動をつくる。</h1>
                <!-- 編集ここ：サブコピー -->
                <p class="hero__subtitle text-center">Photography と AI を通して、<br>あなたらしい発信や活動をサポートします。</p>
            </section>

            <!-- Portal Cards Section -->
            <section class="portals">
                <!-- Photo Card -->
                <!-- 編集ここ：Photo部門リンク先 -->
                <a href="photo.html" class="card fade-in" aria-label="写真撮影・ポートフォリオの詳細を見る">
                    <div class="card__color-wrapper">
                        <!-- 画像の代わりに色付き四角を配置 -->
                        <div class="card__color-block color-block--photo"></div>
                    </div>
                    <div class="card__content">
                        <!-- 編集ここ：Photo部門ブランド名 -->
                        <!-- text-transformの影響を回避 -->
                        <span class="card__brand" style="text-transform: none;">tk14 Photography</span>
                        <!-- 編集ここ：Photo部門タイトル -->
                        <h2 class="card__title">写真撮影・ポートフォリオ</h2>
                        <!-- 編集ここ：Photo部門説明 -->
                        <p class="card__description">プロフィール・SNS用・家族写真など、<br>自然体で伝わる写真を撮影しています。</p>
                        <!-- 編集ここ：Photo部門ボタンテキスト -->
                        <span class="card__button">Photo部門を見る</span>
                    </div>
                </a>

                <!-- AI Card -->
                <!-- 編集ここ：AI部門リンク先 -->
                <a href="ai.html" class="card fade-in" aria-label="AI業務支援・効率化サポートの詳細を見る">
                    <div class="card__color-wrapper">
                        <!-- 画像の代わりに色付き四角を配置 -->
                        <div class="card__color-block color-block--ai"></div>
                    </div>
                    <div class="card__content">
                        <!-- 編集ここ：AI部門ブランド名 -->
                        <!-- text-transformの影響を回避 -->
                        <span class="card__brand" style="text-transform: none;">tk14 AI</span>
                        <!-- 編集ここ：AI部門タイトル -->
                        <h2 class="card__title">AI業務支援・効率化サポート</h2>
                        <!-- 編集ここ：AI部門説明 -->
                        <p class="card__description">生成AIを活用した業務効率化や、<br>中小企業・個人事業向けのサポートを行っています。</p>
                        <!-- 編集ここ：AI部門ボタンテキスト -->
                        <span class="card__button">AI部門を見る</span>
                    </div>
                </a>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <!-- 編集ここ：コピーライト -->
            <p>&copy; 2026 tk14 Works. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ユーザーがアニメーションの軽減を要求しているかチェック
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            if (!prefersReducedMotion) {
                // IntersectionObserverのオプション
                const observerOptions = {
                    root: null, // ビューポートをルートとする
                    rootMargin: '0px',
                    threshold: 0.15 // 要素が15%見えたらコールバックを実行
                };

                // Observerのコールバック関数
                const observerCallback = (entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            // is-visibleクラスを追加してアニメーションをトリガー
                            entry.target.classList.add('is-visible');
                            // 一度表示されたら監視を解除
                            observer.unobserve(entry.target);
                        }
                    });
                };

                // IntersectionObserverのインスタンスを作成
                const observer = new IntersectionObserver(observerCallback, observerOptions);

                // .fade-in クラスを持つすべての要素を監視
                const fadeElements = document.querySelectorAll('.fade-in');
                fadeElements.forEach(el => {
                    observer.observe(el);
                });
            }
        });
    </script>
</body>
</html>
